name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend-client/**"
      - ".github/workflows/deploy-frontend.yml"
  pull_request:
    paths:
      - "frontend-client/**"
      - ".github/workflows/deploy-frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  S3_BUCKET: app.massbailfund.org

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_DOMAIN_URL: https://3sbjv34ec0.execute-api.us-east-1.amazonaws.com/

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: aws s3 sync dist/ "s3://$S3_BUCKET" --delete

      - name: Purge Cloudflare cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
